<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>会议进程 - 移动端</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        @keyframes pulse-blue {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(26, 115, 232, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(26, 115, 232, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(26, 115, 232, 0); }
        }
        .pulse-active { animation: pulse-blue 2s infinite; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center py-4 sm:py-8 h-screen">
<!-- 手机外壳容器 -->
<div class="w-[375px] h-[812px] bg-white rounded-[40px] shadow-2xl border-[8px] border-gray-900 overflow-hidden flex flex-col relative">
<!-- 状态栏 -->
<div class="px-6 py-2 flex justify-between items-center bg-[#1a73e8] text-white">
<span class="text-xs font-bold font-mono">15:32</span>
<div class="flex gap-1 items-center">
<iconify-icon icon="ri:signal-tower-fill" width="14"></iconify-icon>
<iconify-icon icon="ri:wifi-fill" width="14"></iconify-icon>
<iconify-icon class="rotate-90" icon="ri:battery-2-fill" width="16"></iconify-icon>
</div>
</div>
<!-- 顶部导航 -->
<header class="bg-[#1a73e8] text-white px-4 py-3 flex items-center justify-between shadow-md relative z-10">
<button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10">
<iconify-icon icon="ri:arrow-left-s-line" width="24"></iconify-icon>
</button>
<h1 class="text-base font-bold">会议进程</h1>
<button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10">
<iconify-icon icon="ri:more-2-fill" width="20"></iconify-icon>
</button>
</header>
<!-- 内容滚动区 -->
<main class="flex-1 overflow-y-auto bg-gray-50 flex flex-col pb-20">
<!-- 会议基本信息卡片 -->
<div class="p-4">
<div class="bg-white rounded-2xl shadow-sm p-5 border border-gray-100">
<div class="flex items-center gap-2 mb-3">
<span class="w-3 h-3 bg-blue-500 rounded-full pulse-active"></span>
<h2 class="text-base font-bold text-gray-800 leading-tight">2026-06-26 第一期 三重一大会议</h2>
</div>
<div class="space-y-2 mb-4">
<div class="flex items-center gap-2 text-sm text-gray-500">
<iconify-icon class="text-blue-500" icon="ri:map-pin-2-fill"></iconify-icon>
<span>壹 08-047 会议室</span>
</div>
</div>
<!-- 时间进度 -->
<div class="flex items-center justify-between border-t border-gray-50 pt-4">
<div class="flex flex-col">
<span class="text-[10px] text-gray-400">开始时间</span>
<span class="text-sm font-bold">15:00</span>
</div>
<div class="flex flex-col items-center">
<span class="text-[10px] bg-gray-100 px-2 py-0.5 rounded-full text-gray-500 mb-1">预计 2.5小时</span>
<div class="w-24 h-0.5 bg-gray-100 relative">
<div class="absolute inset-0 bg-blue-500 w-[45%]"></div>
</div>
</div>
<div class="flex flex-col items-end">
<span class="text-[10px] text-gray-400">预计结束</span>
<span class="text-sm font-bold">17:30</span>
</div>
</div>
</div>
</div>
<!-- 当前进度指示 -->
<div class="px-4 mb-4">
<div class="bg-blue-600 rounded-2xl p-4 text-white flex items-center justify-between shadow-lg shadow-blue-200">
<div>
<span class="text-[10px] opacity-80 uppercase tracking-widest">当前进度</span>
<div class="text-xl font-bold">第 02 项 <span class="text-sm font-normal opacity-70">/ 共 05 项</span></div>
</div>
<div class="text-right">
<span class="text-[10px] opacity-80 uppercase tracking-widest">议题用时</span>
<div class="text-xl font-mono font-bold">12:35</div>
</div>
</div>
</div>
<!-- 议题时间轴列表 -->
<div class="px-4 flex-1">
<div class="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
<h3 class="text-sm font-bold mb-4 text-gray-400 flex items-center gap-2">
<iconify-icon icon="ri:list-settings-line"></iconify-icon> 会议议程
                    </h3>
<div class="space-y-6 relative before:content-[''] before:absolute before:left-3 before:top-2 before:bottom-2 before:w-px before:bg-gray-100">
<!-- 已结束议题 -->
<div class="relative pl-8">
<div class="absolute left-[7px] top-1.5 w-3 h-3 rounded-full bg-green-500 border-2 border-white"></div>
<div class="flex justify-between items-start mb-1">
<span class="text-[10px] text-green-600 font-bold bg-green-50 px-2 rounded">已结束</span>
<span class="text-[10px] text-gray-400 font-mono">用时 18:32</span>
</div>
<h4 class="text-sm font-medium text-gray-500 line-through decoration-gray-300">01 制作中心2026年度办公设备采购审批</h4>
</div>
<!-- 进行中议题 -->
<div class="relative pl-8">
<div class="absolute left-1 top-1 w-4 h-4 rounded-full bg-blue-500 border-2 border-white pulse-active"></div>
<div class="flex justify-between items-start mb-1">
<span class="text-[10px] text-blue-600 font-bold bg-blue-50 px-2 rounded">进行中...</span>
<span class="text-[10px] text-blue-500 font-mono">15:18 开始</span>
</div>
<h4 class="text-sm font-bold text-gray-800 leading-snug">02 纪录片《丝绸之路》委托制作项目合同立项事宜</h4>
<div class="mt-2 text-[10px] text-gray-400 flex gap-3">
<span class="flex items-center gap-0.5"><iconify-icon icon="ri:user-line"></iconify-icon> 汇报人：赵六</span>
</div>
</div>
<!-- 待开始议题 -->
<div class="relative pl-8">
<div class="absolute left-[7px] top-1.5 w-3 h-3 rounded-full bg-gray-200 border-2 border-white"></div>
<div class="flex justify-between items-start mb-1">
<span class="text-[10px] text-gray-400 font-bold bg-gray-100 px-2 rounded">未开始</span>
</div>
<h4 class="text-sm font-medium text-gray-400">03 2023年度重大宣传项目经费预算审批</h4>
</div>
<!-- 待开始议题 2 -->
<div class="relative pl-8">
<div class="absolute left-[7px] top-1.5 w-3 h-3 rounded-full bg-gray-200 border-2 border-white"></div>
<div class="flex justify-between items-start mb-1">
<span class="text-[10px] text-gray-400 font-bold bg-gray-100 px-2 rounded">未开始</span>
</div>
<h4 class="text-sm font-medium text-gray-400">04 新媒体平台内容合作框架协议</h4>
</div>
</div>
</div>
</div>
</main>
<!-- 底部栏 -->
<footer class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-8 py-3 pb-8 flex justify-center shadow-[0_-4px_10px_rgba(0,0,0,0.03)] rounded-t-3xl">
<button class="w-full py-3 bg-gray-100 text-gray-600 rounded-xl font-bold flex items-center justify-center gap-2 active:bg-gray-200 transition-colors" onclick="history.back()">
<iconify-icon icon="ri:arrow-go-back-line"></iconify-icon> 返回
            </button>
<!-- iOS Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-gray-200 rounded-full"></div>
</footer>
</div>
</body>
</html>
