<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>技术局三重一大会议 - 移动端</title>
<!-- Tailwind CSS -->
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<!-- Iconify -->
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
<!-- 手机外壳容器 -->
<div class="relative w-[375px] h-[812px] bg-[#f5f7fa] rounded-[40px] shadow-2xl overflow-hidden flex flex-col border-[8px] border-[#1a1a1a]">
<!-- 状态栏模拟 -->
<div class="h-10 bg-[#1a73e8] flex justify-between items-center px-8 pt-2 text-white text-xs font-semibold z-20">
<span>15:32</span>
<div class="flex items-center gap-1">
<iconify-icon class="text-sm" icon="mdi:signal"></iconify-icon>
<iconify-icon class="text-sm" icon="mdi:wifi"></iconify-icon>
<iconify-icon class="text-base" icon="mdi:battery"></iconify-icon>
</div>
</div>
<!-- 顶部导航栏 -->
<header class="bg-[#1a73e8] h-14 flex items-center justify-between px-4 text-white flex-none z-10">
<button class="p-2 active:opacity-60 transition-opacity">
<iconify-icon class="text-2xl" icon="mdi:menu"></iconify-icon>
</button>
<h1 class="text-lg font-medium">技术局三重一大会议</h1>
<div class="flex items-center">
<div class="w-8 h-8 rounded-lg bg-[#ffc107] flex items-center justify-center overflow-hidden border border-white/20">
<iconify-icon class="text-white text-xl" icon="mdi:account"></iconify-icon>
</div>
</div>
</header>
<!-- 可滚动内容区 -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-24">
<!-- 筛选区域卡片 -->
<div class="m-3 p-3 bg-white rounded-xl shadow-sm space-y-3">
<div class="flex gap-2">
<div class="flex-1 relative">
<select class="w-full h-9 pl-2 pr-6 bg-[#f8f9fa] border border-gray-200 rounded text-xs text-gray-700 outline-none appearance-none focus:border-[#1a73e8]">
<option>全部状态</option>
<option selected="">进行中</option>
<option>待开始</option>
<option>已结束</option>
</select>
<iconify-icon class="absolute right-2 top-2.5 text-gray-400 pointer-events-none" icon="mdi:chevron-down"></iconify-icon>
</div>
<div class="flex-1">
<input class="w-full h-9 px-2 bg-[#f8f9fa] border border-gray-200 rounded text-xs text-gray-700 outline-none focus:border-[#1a73e8]" type="date"/>
</div>
<div class="flex-1 relative">
<input class="w-full h-9 px-2 bg-[#f8f9fa] border border-gray-200 rounded text-xs text-gray-700 outline-none focus:border-[#1a73e8]" placeholder="期数" type="text"/>
<button class="absolute right-0 top-0 h-9 w-9 flex items-center justify-center text-white bg-[#1a73e8] rounded-r active:bg-blue-700 transition-colors">
<iconify-icon class="text-lg" icon="mdi:magnify"></iconify-icon>
</button>
</div>
</div>
<button class="w-full h-10 bg-[#1a73e8] text-white rounded-lg flex items-center justify-center gap-1 font-medium active:bg-blue-700 transition-colors">
<iconify-icon class="text-xl" icon="mdi:plus"></iconify-icon>
<span>创建会议</span>
</button>
</div>
<!-- 会议卡片列表 -->
<div class="px-3 space-y-3">
<!-- 卡片1: 进行中 -->
<div class="bg-white rounded-xl shadow-sm border-l-4 border-[#1a73e8] overflow-hidden">
<div class="p-4">
<div class="flex justify-between items-start mb-2">
<h3 class="text-sm font-bold text-gray-800 leading-tight pr-12">2026-06-26 第一期 三重一大会议</h3>
<span class="absolute right-6 px-2 py-0.5 bg-blue-50 text-[#1a73e8] text-[10px] font-bold rounded">进行中</span>
</div>
<div class="flex items-center text-[11px] text-gray-500 gap-3 mb-4">
<div class="flex items-center gap-1">
<iconify-icon icon="mdi:clock-outline"></iconify-icon>
<span>今日 15:00 - 17:30</span>
</div>
<div class="flex items-center gap-1">
<iconify-icon icon="mdi:map-marker-outline"></iconify-icon>
<span>壹 08-047 会议室</span>
</div>
</div>
<div class="pt-3 border-t border-gray-50 flex justify-between items-center">
<span class="text-xs text-gray-400">5个议题</span>
<div class="flex gap-4">
<a class="text-xs text-gray-600 active:text-[#1a73e8]" href="#">详情</a>
<a class="text-xs text-[#1a73e8] font-bold active:opacity-70" href="#">进入控制台</a>
</div>
</div>
</div>
</div>
<!-- 卡片2: 待开始 -->
<div class="bg-white rounded-xl shadow-sm border-l-4 border-gray-300 overflow-hidden">
<div class="p-4">
<div class="flex justify-between items-start mb-2">
<h3 class="text-sm font-bold text-gray-800 leading-tight pr-12">2026-06-28 第二期 三重一大会议</h3>
<span class="absolute right-6 px-2 py-0.5 bg-gray-100 text-gray-500 text-[10px] font-bold rounded">待开始</span>
</div>
<div class="flex items-center text-[11px] text-gray-500 gap-3 mb-4">
<div class="flex items-center gap-1">
<iconify-icon icon="mdi:clock-outline"></iconify-icon>
<span>下周一 09:30 - 11:30</span>
</div>
<div class="flex items-center gap-1">
<iconify-icon icon="mdi:map-marker-outline"></iconify-icon>
<span>贰 02-015 报告厅</span>
</div>
</div>
<div class="pt-3 border-t border-gray-50 flex justify-between items-center">
<span class="text-xs text-gray-400">5个议题</span>
<div class="flex gap-4">
<a class="text-xs text-gray-600 active:text-[#1a73e8]" href="#">查看详情</a>
<a class="text-xs text-gray-600 active:text-[#1a73e8]" href="#">编辑</a>
</div>
</div>
</div>
</div>
<!-- 卡片3: 已结束 -->
<div class="bg-white rounded-xl shadow-sm border-l-4 border-green-500 overflow-hidden">
<div class="p-4">
<div class="flex justify-between items-start mb-2">
<h3 class="text-sm font-bold text-gray-800 leading-tight pr-12">2026-05-30 第十二期 制作项目立项会</h3>
<span class="absolute right-6 px-2 py-0.5 bg-green-50 text-green-600 text-[10px] font-bold rounded">已结束</span>
</div>
<div class="flex items-center text-[11px] text-gray-500 gap-3 mb-4">
<div class="flex items-center gap-1">
<iconify-icon icon="mdi:clock-outline"></iconify-icon>
<span>2026-05-30 14:00 - 16:00</span>
</div>
<div class="flex items-center gap-1">
<iconify-icon icon="mdi:map-marker-outline"></iconify-icon>
<span>叁 03-022 会议室</span>
</div>
</div>
<div class="pt-3 border-t border-gray-50 flex justify-between items-center">
<span class="text-xs text-gray-400">3个议题</span>
<div class="flex gap-4">
<a class="text-xs text-gray-600 active:text-[#1a73e8]" href="#">查看详情</a>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- 底部导航栏 -->
<nav class="h-16 bg-white border-t border-gray-100 flex items-center justify-around px-4 flex-none z-10 pb-2">
<button class="flex flex-col items-center gap-1 text-gray-400 active:scale-95 transition-transform">
<iconify-icon class="text-2xl" icon="mdi:home-outline"></iconify-icon>
<span class="text-[10px]">首页</span>
</button>
<button class="flex flex-col items-center gap-1 text-[#1a73e8] active:scale-95 transition-transform">
<iconify-icon class="text-2xl" icon="mdi:calendar-check"></iconify-icon>
<span class="text-[10px] font-bold">会议</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400 active:scale-95 transition-transform">
<div class="relative">
<iconify-icon class="text-2xl" icon="mdi:message-text-outline"></iconify-icon>
<span class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>
</div>
<span class="text-[10px]">消息</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400 active:scale-95 transition-transform">
<iconify-icon class="text-2xl" icon="mdi:account-outline"></iconify-icon>
<span class="text-[10px]">我的</span>
</button>
</nav>
<!-- iOS 指示条模拟 -->
<div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-gray-200 rounded-full"></div>
</div>
<script>
        // 添加简单的点击效果
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('click', (e) => {
                if(el.getAttribute('href') === '#') e.preventDefault();
            });
        });
    </script>
</body>
</html>
